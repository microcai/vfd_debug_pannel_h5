<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>变频器控制面板</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
        }

        .btn:hover {
            background-color: #45a049;
        }

        .btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .btn-read {
            background-color: #2196F3;
        }

        .btn-read:hover {
            background-color: #1976D2;
        }

        .btn-write {
            background-color: #FF9800;
        }

        .btn-write:hover {
            background-color: #F57C00;
        }

        .status {
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .status-connected {
            background-color: #4CAF50;
            color: white;
        }

        .status-disconnected {
            background-color: #f44336;
            color: white;
        }

        .display-section {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .display-card {
            flex: 1;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .display-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .display-value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }

        .display-unit {
            font-size: 14px;
            color: #999;
        }

        .input-section {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            flex: 1;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .button-row {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .log-section {
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            color: #00ff00;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-section h3 {
            color: #fff;
            margin-top: 0;
            font-size: 14px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .log-sent {
            color: #FFD700;
        }

        .log-received {
            color: #00ff00;
        }

        .log-info {
            color: #888;
        }

        .log-error {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <h1>变频器控制面板</h1>

    <div class="header">
        <button id="connectBtn" class="btn">打开串口</button>
        <div id="status" class="status status-disconnected">未连接</div>
    </div>

    <div class="display-section">
        <div class="display-card">
            <div class="display-label">当前电压</div>
            <div class="display-value" id="voltage">0.0</div>
            <div class="display-unit">V</div>
        </div>
        <div class="display-card">
            <div class="display-label">当前电流</div>
            <div class="display-value" id="current">0.0</div>
            <div class="display-unit">A</div>
        </div>
        <div class="display-card">
            <div class="display-label">当前频率</div>
            <div class="display-value" id="frequency">0.0</div>
            <div class="display-unit">Hz</div>
        </div>
    </div>

    <div class="display-section">
        <div class="display-card">
            <div class="display-label">目标转速</div>
            <div class="display-value" id="targetSpeedDisplay">0.0</div>
            <div class="display-unit">Hz</div>
        </div>
        <div class="display-card">
            <div class="display-label">目标角度</div>
            <div class="display-value" id="targetAngleDisplay">0.0</div>
            <div class="display-unit">°</div>
        </div>
    </div>

    <div class="input-section">
        <div class="input-row">
            <div class="input-group">
                <label for="targetSpeed">设置目标转速 (Hz)</label>
                <input type="number" id="targetSpeed" placeholder="输入目标转速" value="50">
            </div>
            <div class="input-group">
                <label for="targetAngle">设置目标角度 (度)</label>
                <input type="number" id="targetAngle" placeholder="输入目标角度" value="281">
            </div>
        </div>
        <div class="button-row">
            <button id="readBtn" class="btn btn-read" disabled>读取</button>
            <button id="writeBtn" class="btn btn-write" disabled>写入</button>
        </div>
    </div>

    <div class="log-section">
        <h3>通信日志</h3>
        <div id="log"></div>
    </div>

    <script src="vfd.js"></script>
</body>
</html>
